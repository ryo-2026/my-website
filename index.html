<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Athlete" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <title>Athlete Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      height: 100%;
      background: #0d0d1a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #root { min-height: 100%; }
    input, textarea, button { font-family: inherit; }
    textarea { -webkit-appearance: none; }
    body { overscroll-behavior-y: none; }
    @keyframes ptr-spin {
      to { transform: rotate(360deg); }
    }

    /* PWA Install Banner */
    #pwa-banner {
      display: none;
      position: sticky;
      top: 0;
      z-index: 9999;
      background: #e0ff4f;
      color: #0d0d1a;
      padding: 10px 16px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      font-weight: 700;
    }
    #pwa-banner.visible { display: flex; }
    #pwa-banner button {
      padding: 6px 14px;
      border-radius: 8px;
      border: 2px solid #0d0d1a;
      background: #0d0d1a;
      color: #e0ff4f;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #pwa-banner .dismiss {
      background: transparent;
      border-color: transparent;
      color: #0d0d1a;
      opacity: 0.5;
      font-size: 18px;
      padding: 4px 8px;
    }

    /* iOS install hint */
    #ios-hint {
      display: none;
      position: sticky;
      top: 0;
      z-index: 9999;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3e;
      color: #fff;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }
    #ios-hint.visible { display: block; }
    #ios-hint .accent { color: #e0ff4f; font-weight: 700; }
    #ios-hint .close-btn {
      position: absolute; top: 8px; right: 12px;
      background: none; border: none; color: #555; font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Android / Desktop Chrome: install banner -->
  <div id="pwa-banner">
    <span>⚡ ホーム画面にアプリを追加できます</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button id="pwa-install-btn">インストール</button>
      <button class="dismiss" id="pwa-dismiss-btn" aria-label="閉じる">×</button>
    </div>
  </div>

  <!-- iOS Safari: install hint -->
  <div id="ios-hint" style="position:relative;">
    <button class="close-btn" id="ios-close-btn" aria-label="閉じる">×</button>
    <span class="accent">📲 iPhoneにインストール：</span><br>
    Safari の <span class="accent">共有ボタン（□↑）</span> →「<span class="accent">ホーム画面に追加</span>」をタップ
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    // ===== Service Worker Registration =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered, scope:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }

    // ===== PWA Install Prompt (Android / Desktop Chrome) =====
    let deferredPrompt = null;
    const banner     = document.getElementById('pwa-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const dismissBtn = document.getElementById('pwa-dismiss-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.classList.add('visible');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Install outcome:', outcome);
      deferredPrompt = null;
      banner.classList.remove('visible');
    });

    dismissBtn.addEventListener('click', () => {
      banner.classList.remove('visible');
    });

    window.addEventListener('appinstalled', () => {
      banner.classList.remove('visible');
      console.log('[PWA] App installed!');
    });

    // ===== iOS Safari Install Hint =====
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandaloneMode = ('standalone' in navigator) && navigator.standalone;
    const iosHintDismissed = sessionStorage.getItem('ios-hint-dismissed');

    if (isIOS && !isInStandaloneMode && !iosHintDismissed) {
      document.getElementById('ios-hint').classList.add('visible');
    }

    document.getElementById('ios-close-btn').addEventListener('click', () => {
      document.getElementById('ios-hint').classList.remove('visible');
      sessionStorage.setItem('ios-hint-dismissed', '1');
    });
  </script>
</body>
</html>
